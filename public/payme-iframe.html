<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayMe Payment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      direction: rtl;
    }
    .field-group { margin-bottom: 16px; }
    .field-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #051839;
      margin-bottom: 6px;
    }
    .field-container {
      height: 48px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-container.focused {
      border-color: #C4A35A;
      box-shadow: 0 0 0 3px rgba(196, 163, 90, 0.15);
    }
    .field-container.valid { border-color: #86efac; }
    .field-container.invalid { border-color: #fca5a5; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 12px;
      color: #b91c1c;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .error-box.visible { display: block; }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 0;
      color: #5A4A2A;
    }
    .loading.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #C4A35A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fields-area { display: none; }
    .fields-area.ready { display: block; }
    .submit-btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(to left, #C4A35A, #D4B36A);
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .submit-btn:not(:disabled):hover { opacity: 0.9; }
    .security-badge {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>טוען מערכת תשלום מאובטחת...</span>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="fields-area" id="fields-area">
    <div class="field-group">
      <label class="field-label">מספר כרטיס</label>
      <div class="field-container" id="card-number-wrapper">
        <div id="card-number" style="width:100%;height:100%"></div>
      </div>
    </div>
    <div class="row">
      <div class="field-group">
        <label class="field-label">תוקף</label>
        <div class="field-container" id="expiration-wrapper">
          <div id="card-expiration" style="width:100%;height:100%"></div>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">CVV</label>
        <div class="field-container" id="cvc-wrapper">
          <div id="card-cvc" style="width:100%;height:100%"></div>
        </div>
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" disabled>
      🔒 <span id="btn-text">שלם</span>
    </button>
    <div class="security-badge">מאובטח על ידי PayMe</div>
  </div>

  <script src="https://cdn.payme.io/hf/v1/hostedfields.js"></script>
  <script>
    let paymeInstance = null;
    let fieldValidity = { cardNumber: false, cardExpiration: false, cvc: false };
    let config = null;

    function postToParent(type, data) {
      window.parent.postMessage({ source: 'payme-iframe', type, ...data }, '*');
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.classList.add('visible');
    }

    function hideError() {
      document.getElementById('error-box').classList.remove('visible');
    }

    function updateSubmitButton() {
      const allValid = fieldValidity.cardNumber && fieldValidity.cardExpiration && fieldValidity.cvc;
      document.getElementById('submit-btn').disabled = !allValid;
      postToParent('validity', { isValid: allValid });
    }

    function setupFieldEvents(field, name, wrapperId) {
      const wrapper = document.getElementById(wrapperId);
      
      field.on('focus', () => {
        wrapper.classList.add('focused');
        wrapper.classList.remove('valid', 'invalid');
      });
      
      field.on('blur', (e) => {
        wrapper.classList.remove('focused');
        fieldValidity[name] = e.isValid;
        wrapper.classList.toggle('valid', e.isValid);
        wrapper.classList.toggle('invalid', !e.isValid && true);
        updateSubmitButton();
      });

      field.on('validity-changed', (e) => {
        fieldValidity[name] = e.isValid;
        updateSubmitButton();
      });

      field.on('keyup', (e) => {
        fieldValidity[name] = e.isValid;
        updateSubmitButton();
      });
    }

    async function init(cfg) {
      config = cfg;
      try {
        // Wait for PayMe SDK
        let attempts = 0;
        while (!window.PayMe?.create && attempts < 50) {
          await new Promise(r => setTimeout(r, 100));
          attempts++;
        }
        if (!window.PayMe?.create) throw new Error('PayMe SDK not available');

        paymeInstance = await window.PayMe.create(cfg.apiKey, { testMode: cfg.testMode });

        const hostedFields = paymeInstance.hostedFields();
        
        const cardNumber = hostedFields.create(window.PayMe.fields.NUMBER);
        const cardExpiration = hostedFields.create(window.PayMe.fields.EXPIRATION);
        const cvc = hostedFields.create(window.PayMe.fields.CVC);

        setupFieldEvents(cardNumber, 'cardNumber', 'card-number-wrapper');
        setupFieldEvents(cardExpiration, 'cardExpiration', 'expiration-wrapper');
        setupFieldEvents(cvc, 'cvc', 'cvc-wrapper');

        await Promise.all([
          cardNumber.mount('#card-number'),
          cardExpiration.mount('#card-expiration'),
          cvc.mount('#card-cvc'),
        ]);

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('fields-area').classList.add('ready');
        document.getElementById('btn-text').textContent = 'שלם ₪' + cfg.amount.toLocaleString();
        
        postToParent('ready', {});
      } catch (err) {
        console.error('PayMe init error:', err);
        showError('שגיאה בטעינת מערכת התשלום');
        document.getElementById('loading').classList.add('hidden');
        postToParent('error', { message: err.message });
      }
    }

    async function handleSubmit() {
      if (!paymeInstance || !config) return;
      
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.querySelector('#btn-text').textContent = 'מעבד תשלום...';
      hideError();

      try {
        const nameParts = config.payerName.trim().split(' ');
        const firstName = nameParts[0] || '';
        const lastName = nameParts.slice(1).join(' ') || firstName;

        const result = await paymeInstance.tokenize({
          payerFirstName: firstName,
          payerLastName: lastName,
          payerEmail: config.payerEmail || 'guest@example.com',
          payerPhone: config.payerPhone || '',
          total: {
            label: config.productLabel,
            amount: {
              currency: 'ILS',
              value: config.amount.toFixed(2),
            },
          },
        });

        if (result.type === 'tokenize-success' && result.token) {
          postToParent('tokenize', {
            token: result.token,
            cardMask: result.card?.cardMask,
            expiry: result.card?.expiry,
          });
        } else {
          throw new Error('Tokenization failed');
        }
      } catch (err) {
        console.error('Tokenize error:', err);
        const msg = err?.errors 
          ? Object.values(err.errors).join(', ')
          : 'שגיאה בעיבוד התשלום';
        showError(msg);
        postToParent('error', { message: msg });
        btn.disabled = false;
        btn.querySelector('#btn-text').textContent = 'שלם ₪' + config.amount.toLocaleString();
      }
    }

    document.getElementById('submit-btn').addEventListener('click', handleSubmit);

    // Listen for messages from parent
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'init') {
        init(e.data.config);
      }
    });

    // Signal parent that iframe is loaded
    postToParent('loaded', {});
  </script>
</body>
</html>
